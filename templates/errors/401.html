{% extends "base.html" %}

{% block title %}Unauthorized - Emergency Ride-Hailing{% endblock %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-page">
                <div class="error-icon mb-4">
                    <i class="fas fa-user-shield fa-4x text-info"></i>
                </div>
                <h1 class="display-1 fw-bold text-info">401</h1>
                <h2 class="mb-3">Unauthorized</h2>
                <p class="lead text-muted mb-4">
                    Please login to access this page. 
                    Authentication is required for this resource.
                </p>
                <div class="d-flex gap-3 justify-content-center">
                    <a href="{{ url_for('login') }}" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-user-plus me-2"></i>Register
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.error-page {
    padding: 2rem;
}
.error-icon {
    opacity: 0.5;
}
</style>
{% endblock %}
